# Hyperparameters surfaced for DVC experiments (`dvc exp run --set-param ...`).
preprocess:
  min_token_len: 2
  remove_stopwords: true
  keep_negations: true

vectorizer:
  max_features: 50000
  ngram_range: [1, 2]
  min_df: 2

bm25:
  k1: 1.5
  b: 0.75

classifier:
  C: 1.0
  max_iter: 1000
  class_weight: balanced
